<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💥 עכברים מתפוצצים</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;}
#gc{position:relative;background:#000;overflow:hidden;}
canvas{display:block;}

/* HUD */
.hud{position:absolute;font-weight:700;pointer-events:none;text-shadow:0 0 8px currentColor;}
#sc1{top:10px;left:14px;color:#5bf;font-size:0.95rem;}
#sc2{top:10px;right:60px;color:#fa7;font-size:0.95rem;display:none;}
#wv{top:10px;left:50%;transform:translateX(-50%);color:#5ff;font-size:0.85rem;white-space:nowrap;}
#coinsHud{top:30px;left:14px;color:#fd4;font-size:0.82rem;}
#lvs{top:30px;left:50%;transform:translateX(-50%);font-size:0.8rem;white-space:nowrap;}
#shopBtn{position:absolute;top:8px;right:10px;font-size:0.78rem;padding:5px 9px;background:#fd4;color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:700;z-index:15;box-shadow:0 2px 8px rgba(255,220,0,0.4);}
#shopBtn:hover{background:#ffe566;}

/* PROGRESS BAR */
#stageBar{position:absolute;bottom:0;left:0;width:100%;height:5px;background:rgba(255,255,255,0.07);}
#stgProg{height:5px;width:0%;transition:width 0.4s;border-radius:0 3px 3px 0;}

/* OVERLAYS */
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:20;padding:14px;overflow-y:auto;}
#ov{background:radial-gradient(ellipse at center,#0a0a1a 60%,#000 100%);}
#shopOv{background:rgba(5,5,18,0.97);display:none;justify-content:flex-start;padding-top:14px;}
#stageOv{background:radial-gradient(ellipse at center,#050520 60%,#000 100%);display:none;}
#lbOv{background:rgba(5,5,18,0.97);display:none;}

/* BUTTONS */
.gbtn{font-size:0.88rem;padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin:3px;transition:all 0.15s;letter-spacing:0.3px;}
.gbtn-yellow{background:#fd4;color:#000;box-shadow:0 2px 10px rgba(255,210,0,0.3);}
.gbtn-yellow:hover{background:#ffe566;transform:translateY(-1px);}
.gbtn-blue{background:#3af;color:#000;box-shadow:0 2px 10px rgba(0,170,255,0.3);}
.gbtn-blue:hover{background:#6df;transform:translateY(-1px);}
.gbtn-green{background:#4e4;color:#000;font-size:1rem;padding:10px 26px;box-shadow:0 2px 12px rgba(0,220,0,0.35);}
.gbtn-green:hover{background:#7f7;transform:translateY(-1px);}
.gbtn-purple{background:#a4f;color:#fff;box-shadow:0 2px 10px rgba(160,80,255,0.3);}
.gbtn-purple:hover{background:#c8f;transform:translateY(-1px);}
.gbtn-gray{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25);}
.gbtn-gray:hover{background:rgba(255,255,255,0.25);}
.gbtn-red{background:#f44;color:#fff;}
.gbtn-red:hover{background:#f66;}

/* TEXT INPUTS */
input[type=text]{font-size:0.92rem;padding:8px 14px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:8px;outline:none;text-align:center;width:230px;transition:border 0.15s;}
input[type=text]:focus{border-color:#fd4;}
input[type=text]::placeholder{color:rgba(255,255,255,0.3);}

/* SHOP GRID */
#shopGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;max-width:660px;}
#shopAmmo{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;max-width:660px;margin-top:5px;}
.shopCard,.ammoCard{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 5px;text-align:center;cursor:pointer;transition:all 0.15s;}
.shopCard:hover,.ammoCard:hover{border-color:#fd4;background:rgba(255,220,0,0.06);}
.shopCard.owned,.ammoCard.owned{border-color:rgba(80,200,255,0.6);}
.shopCard.active,.ammoCard.active{border-color:#4e4;background:rgba(0,200,0,0.07);}
.shopCard canvas{display:block;margin:0 auto 4px;}
.card-name{color:#fff;font-size:0.68rem;font-weight:700;margin-bottom:2px;}
.card-price{font-size:0.63rem;font-weight:700;}
.card-price.free{color:#4e4;}
.card-price.buyable{color:#fd4;}
.card-price.owned-lbl{color:#5bf;}
.card-price.active-lbl{color:#4e4;}
.card-desc{color:rgba(255,255,255,0.5);font-size:0.58rem;line-height:1.35;margin-top:2px;}

/* SECTION TITLE */
.sec-title{color:rgba(255,255,255,0.6);font-size:0.75rem;font-weight:600;margin:4px 0 3px;align-self:flex-start;max-width:660px;letter-spacing:0.5px;}

/* LEADERBOARD */
#lbTable{width:100%;max-width:480px;border-collapse:collapse;}
#lbTable th{color:#fd4;font-size:0.78rem;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,0.12);text-align:right;}
#lbTable td{color:#ddd;font-size:0.78rem;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,0.06);text-align:right;}
#lbTable tr:nth-child(1) td{color:#fd4;font-weight:700;}
#lbTable tr:nth-child(2) td{color:#ccc;}
#lbTable tr:nth-child(3) td{color:#c84;}

/* BONUS FLASH */
#bonusFlash{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:1.2rem;color:#fd4;font-weight:700;text-align:center;pointer-events:none;display:none;z-index:30;text-shadow:0 0 20px #fd4,0 0 40px #fd4;background:rgba(0,0,0,0.7);padding:12px 24px;border-radius:12px;border:1px solid rgba(255,220,0,0.4);}

/* STAGE SCREEN */
.stage-icon{font-size:2.5rem;margin-bottom:2px;filter:drop-shadow(0 0 12px rgba(255,200,0,0.6));}
.stage-title{color:#fd4;font-size:2rem;font-weight:800;text-shadow:0 0 20px rgba(255,210,0,0.5);}
.stage-prev{color:rgba(255,255,255,0.4);font-size:0.75rem;}
.stage-desc{color:#ddd;font-size:0.85rem;text-align:center;line-height:1.8;}
.stage-warning{color:#fa7;font-size:0.78rem;text-align:center;line-height:1.6;max-width:310px;}
.stat-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 18px;text-align:center;}
.stat-label{color:rgba(255,255,255,0.4);font-size:0.68rem;}
.stat-val{font-size:0.95rem;font-weight:700;}

/* TITLE */
.game-title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#fd4,#fa7,#f4a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,180,0,0.4));}

/* CODE INPUT POPUP */
#codePopup{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="cv"></canvas>
  <div class="hud" id="sc1">P1: 0</div>
  <div class="hud" id="sc2">P2: 0</div>
  <div class="hud" id="wv">STAGE 1 · WAVE 1</div>
  <div class="hud" id="coinsHud">💰 0</div>
  <div class="hud" id="lvs"></div>
  <button id="shopBtn">🛒 חנות</button>
  <div id="stageBar"><div id="stgProg"></div></div>
  <div id="bonusFlash"></div>

  <!-- MAIN OVERLAY -->
  <div class="overlay" id="ov"></div>

  <!-- SHOP -->
  <div class="overlay" id="shopOv">
    <!-- Shop header: title + coins -->
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:660px;">
      <span style="color:#fd4;font-size:1.1rem;font-weight:800;text-shadow:0 0 10px rgba(255,210,0,0.5)">🛒 חנות</span>
      <span style="color:#fd4;font-size:1rem;font-weight:700" id="shopCoinsDisp">💰 0</span>
    </div>
    <!-- Shop buttons row: clearly labeled, full width, easy to tap -->
    <div style="display:flex;gap:8px;width:100%;max-width:660px;justify-content:stretch;">
      <button class="gbtn gbtn-green" id="resumeShop" style="flex:2;font-size:0.9rem;padding:10px 8px;border-radius:10px;">▶ חזור למשחק</button>
      <button class="gbtn gbtn-purple" id="bonusCodeBtn" style="flex:2;font-size:0.9rem;padding:10px 8px;border-radius:10px;">🎁 קוד בונוס</button>
      <button class="gbtn gbtn-gray" id="closeShop" style="flex:1;font-size:0.9rem;padding:10px 8px;border-radius:10px;">✕ סגור</button>
    </div>
    <div class="sec-title">✈️ חלליות</div>
    <div id="shopGrid"></div>
    <div class="sec-title">🚀 טילים</div>
    <div id="shopAmmo"></div>
  </div>

  <!-- STAGE TRANSITION -->
  <div class="overlay" id="stageOv"></div>

  <!-- LEADERBOARD -->
  <div class="overlay" id="lbOv">
    <div class="game-title" style="font-size:1.4rem">🏆 לוח שיאים</div>
    <table id="lbTable"><thead><tr><th>#</th><th>שם</th><th>ניקוד</th><th>שלב</th></tr></thead><tbody id="lbBody"></tbody></table>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="gbtn gbtn-yellow" id="lbBack">◀ חזור</button>
      <button class="gbtn gbtn-gray" id="lbClear">🗑 נקה שיאים</button>
    </div>
  </div>

  <!-- CODE POPUP -->
  <div id="codePopup">
    <div style="color:#a4f;font-size:1.3rem;font-weight:800">🎁 קוד בונוס</div>
    <div style="color:rgba(255,255,255,0.5);font-size:0.82rem;text-align:center">הכנס קוד מיוחד:</div>
    <input type="text" id="codeInput" placeholder="הכנס קוד..." style="text-transform:uppercase;font-size:1rem;padding:10px 16px;width:240px;">
    <div id="codeMsg" style="color:#fd4;font-size:0.88rem;min-height:22px;text-align:center;font-weight:700;"></div>
    <div style="display:flex;gap:8px;">
      <button class="gbtn gbtn-purple" id="applyCodeBtn">✓ אשר קוד</button>
      <button class="gbtn gbtn-gray" id="cancelCodeBtn">✕ ביטול</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const W=680,H=520;
cv.width=W;cv.height=H;
const gc=document.getElementById('gc');
gc.style.width=W+'px';gc.style.height=H+'px';
cv.style.width=W+'px';cv.style.height=H+'px';

// ─── SAVE / LOAD ───────────────────────────────────────────
const SAVE_KEY='exploding_mice_v7';
function saveGame(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({coins,selectedPlane,selectedAmmo,leaderboard,
    planesOwned:PLANES.map(p=>p.owned),ammosOwned:AMMOS.map(a=>a.owned),usedCodes:[...usedCodes]}));}catch(e){}
}
function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    if(d.coins)coins=d.coins;
    if(d.selectedPlane)selectedPlane=d.selectedPlane;
    if(d.selectedAmmo)selectedAmmo=d.selectedAmmo;
    if(d.leaderboard)leaderboard=d.leaderboard;
    if(d.planesOwned)d.planesOwned.forEach((v,i)=>{if(PLANES[i])PLANES[i].owned=v;});
    if(d.ammosOwned)d.ammosOwned.forEach((v,i)=>{if(AMMOS[i])AMMOS[i].owned=v;});
    if(d.usedCodes)usedCodes=new Set(d.usedCodes);
  }catch(e){}
}

// ─── DATA ──────────────────────────────────────────────────
const STAGES=[
  {label:'STAGE 1',waves:2,hpBase:1,speedMult:1.0,rows:3,cols:9,desc:'עכברים פשוטים. ירי נמוך.',icon:'🐭',warn:'קל – התחמם!'},
  {label:'STAGE 2',waves:2,hpBase:1,speedMult:1.4,rows:4,cols:10,desc:'4 שורות. מהירות גבוהה ב-40%.',icon:'💨🐭',warn:'מהירות עלתה!'},
  {label:'STAGE 3',waves:2,hpBase:2,speedMult:1.8,rows:4,cols:10,desc:'עכברים מוגנים – 2 HP לכל עכבר.',icon:'🛡️🐭',warn:'צריך 2 פגיעות!'},
  {label:'STAGE 4',waves:2,hpBase:2,speedMult:2.2,rows:5,cols:10,desc:'5 שורות + מהירות גבוהה מאוד.',icon:'⚡🐭',warn:'5 שורות – שמור על מרחק!'},
  {label:'STAGE 5',waves:3,hpBase:3,speedMult:2.7,rows:5,cols:10,desc:'BOSS WAVE – 3 HP, ירי אינטנסיבי.',icon:'💀🐭',warn:'הכי קשה – בהצלחה!'},
];

const PLANES=[
  {id:0,name:'F-16 Falcon',price:0,color:'#5bf',accent:'#9ef',w:46,h:30,speed:5.5,fireRate:195,lives:3,desc:'מהיר, קלאסי',owned:true},
  {id:1,name:"F-35 Stealth",price:800,color:'#7f7',accent:'#afa',w:50,h:28,speed:7,fireRate:160,lives:3,desc:'ירי מהיר',owned:false},
  {id:2,name:'F-15 Eagle',price:1500,color:'#fa7',accent:'#fc9',w:54,h:34,speed:6,fireRate:140,lives:4,desc:'4 חיים',owned:false},
  {id:3,name:'F-22 Raptor',price:3000,color:'#d9f',accent:'#fdf',w:52,h:32,speed:8,fireRate:120,lives:4,desc:'מהיר + 4 חיים',owned:false},
  {id:4,name:'SR-71 Blackbird',price:6000,color:'#fd4',accent:'#ff9',w:60,h:26,speed:9,fireRate:100,lives:5,desc:'5 חיים, הכי מהיר',owned:false},
  {id:5,name:'X-Wing',price:12000,color:'#4ff',accent:'#8ff',w:62,h:32,speed:9,fireRate:85,lives:5,desc:'ירי מ-3 נקודות!',owned:false,twin:true},
  {id:6,name:'Angel Jet',price:25000,color:'#fa4',accent:'#fc8',w:58,h:36,speed:10,fireRate:70,lives:6,desc:'6 חיים, אש מהירה',owned:false},
  {id:7,name:'NADAV-1 💎',price:100000,color:'#fff',accent:'#fd4',w:66,h:30,speed:12,fireRate:50,lives:8,desc:'ULTRA: 8 חיים',owned:false},
];

const AMMOS=[
  {id:0,name:'קליע רגיל',price:0,color:'#fd4',glow:'#fa0',w:4,h:14,speed:10,dmg:1,spread:0,desc:'סטנדרטי',owned:true},
  {id:1,name:'טיל כפול',price:400,color:'#5ff',glow:'#0ff',w:4,h:13,speed:10,dmg:1,spread:16,desc:'שני קליעים',owned:false},
  {id:2,name:'לייזר',price:900,color:'#f55',glow:'#f00',w:3,h:20,speed:15,dmg:1,spread:0,desc:'מהיר x1.5',owned:false},
  {id:3,name:'רקטה',price:2000,color:'#f84',glow:'#f40',w:7,h:17,speed:8,dmg:2,spread:0,desc:'נזק x2',owned:false},
  {id:4,name:'פלזמה',price:4000,color:'#b4f',glow:'#80f',w:9,h:15,speed:11,dmg:3,spread:0,desc:'נזק x3',owned:false},
  {id:5,name:'טיל רב-ראשי',price:8000,color:'#5f5',glow:'#0f0',w:5,h:16,speed:9,dmg:2,spread:12,desc:'כפול + נזק x2',owned:false},
  {id:6,name:'מיני-נוקלאר',price:20000,color:'#ff4',glow:'#ff0',w:11,h:19,speed:7,dmg:5,spread:0,desc:'נזק x5 ☢️',owned:false},
  {id:7,name:'OMEGA 💀',price:50000,color:'#fff',glow:'#aaf',w:12,h:22,speed:14,dmg:8,spread:0,desc:'מהיר + נזק x8',owned:false},
];

const BONUS_CODES={
  'NADAV':{coins:1000000,msg:'💰 מיליון מטבעות! NADAV MODE ACTIVATED!'},
  'NITAY':{coins:50000,msg:'💰 50,000 מטבעות לניתי!'},
  'GODMODE':{lives:99,msg:'❤️ 99 חיים – GOD MODE!'},
  'SPEEDUP':{fireBoost:true,msg:'⚡ ירי מהיר פי 2!'},
  'MATRIX':{coins:10000,msg:'💊 10,000 מטבעות – ברוך הבא'},
};

// ─── STATE ─────────────────────────────────────────────────
let coins=0,selectedPlane=0,selectedAmmo=0;
let leaderboard=[];
let usedCodes=new Set();
let fireBoost=false;
let mode=1,playing=false,frame=0;
let stage=0,waveInStage=0;
let p1Name='Player 1',p2Name='Player 2';
let mice=[],bullets=[],eBullets=[],surprises=[],particles=[],bonusTexts=[],stars=[];
let mDir=1,mSpeed=0.5,dropping=false,dropAmt=0;
let keys={},lastShot1=0,lastShot2=0;
let audioCtx=null,wasPlaying=false;
let p1={x:W/2-23,y:H-50,flash:0,lives:3,score:0,alive:true,trail:[]};
let p2={x:W*0.65,y:H-50,flash:0,lives:3,score:0,alive:true,trail:[]};
let shakeFrames=0;

loadGame();

// ─── INIT STARS ───────────────────────────────────────────
for(let i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*1.8+0.3,speed:Math.random()*0.3+0.05,bright:Math.random()});

function curPlane(){return PLANES[selectedPlane];}
function curAmmo(){return AMMOS[selectedAmmo];}
function curStage(){return STAGES[Math.min(stage,STAGES.length-1)];}

// ─── AUDIO ────────────────────────────────────────────────
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(f,d,t,v){
  t=t||'square';v=v||0.08;
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
    o.start();o.stop(audioCtx.currentTime+d);
  }catch(e){}
}

// ─── LEADERBOARD ──────────────────────────────────────────
function addScore(name,score,stg){
  leaderboard.push({name,score,stage:stg});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,10);
  saveGame();
}
function renderLB(){
  const body=document.getElementById('lbBody');
  body.innerHTML='';
  if(!leaderboard.length){
    body.innerHTML='<tr><td colspan="4" style="color:rgba(255,255,255,0.3);text-align:center;padding:16px">אין שיאים עדיין</td></tr>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  leaderboard.forEach((e,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${medals[i]||i+1}</td><td>${e.name}</td><td>${e.score.toLocaleString()}</td><td>Stage ${e.stage+1}</td>`;
    body.appendChild(tr);
  });
}

// ─── BONUS CODE ───────────────────────────────────────────
function showBonusInput(){
  const popup=document.getElementById('codePopup');
  const inp=document.getElementById('codeInput');
  const msg=document.getElementById('codeMsg');
  inp.value='';msg.textContent='';
  popup.style.display='flex';
  setTimeout(()=>inp.focus(),100);
}
document.getElementById('applyCodeBtn').onclick=()=>{
  const inp=document.getElementById('codeInput');
  const msg=document.getElementById('codeMsg');
  const c=inp.value.toUpperCase().trim();
  if(usedCodes.has(c)){msg.style.color='#f55';msg.textContent='⚠️ קוד כבר נוצל!';return;}
  if(!BONUS_CODES[c]){msg.style.color='#f55';msg.textContent='❌ קוד לא תקין';return;}
  const b=BONUS_CODES[c];
  usedCodes.add(c);
  if(b.coins)coins+=b.coins;
  if(b.lives){p1.lives+=b.lives;if(mode===2)p2.lives+=b.lives;}
  if(b.fireBoost)fireBoost=true;
  saveGame();updateHUD();
  msg.style.color='#4e4';msg.textContent=b.msg;
  showFlash(b.msg);
  setTimeout(()=>{document.getElementById('codePopup').style.display='none';renderShop();},1400);
};
document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('applyCodeBtn').click();});
document.getElementById('cancelCodeBtn').onclick=()=>{document.getElementById('codePopup').style.display='none';};
document.getElementById('bonusCodeBtn').onclick=showBonusInput;

function showFlash(msg){
  const f=document.getElementById('bonusFlash');
  f.textContent=msg;f.style.display='block';
  setTimeout(()=>f.style.display='none',2500);
}

// ─── WAVE INIT ────────────────────────────────────────────
function initWave(){
  mice=[];
  const s=curStage();
  const mw=36,mh=24,gap=8;
  const gx=(W-s.cols*(mw+gap))/2;
  for(let r=0;r<s.rows;r++){
    for(let c=0;c<s.cols;c++){
      const maxHp=s.hpBase+(r===0?1:0);
      mice.push({x:gx+c*(mw+gap),y:56+r*(mh+12),r,c,alive:true,hp:maxHp,maxHp,flashTimer:0});
    }
  }
  mDir=1;mSpeed=(0.4+waveInStage*0.07)*s.speedMult;dropping=false;dropAmt=0;
  const prog=document.getElementById('stgProg');
  prog.style.width=(waveInStage/s.waves*100)+'%';
  const cols=['#fd4','#f84','#f55','#f55','#f00'];
  prog.style.background=cols[Math.min(stage,cols.length-1)];
}

function drawPlaneToCanvas(c,p,cw,ch){
  const x=cw/2-p.w/2,y=ch/2-p.h/2;
  // glow
  c.shadowColor=p.color;c.shadowBlur=12;
  c.fillStyle=p.color;
  c.beginPath();c.moveTo(x+p.w/2,y);c.lineTo(x+p.w,y+p.h);
  c.lineTo(x+p.w*0.65,y+p.h*0.75);c.lineTo(x+p.w/2,y+p.h*0.9);
  c.lineTo(x+p.w*0.35,y+p.h*0.75);c.lineTo(x,y+p.h);c.closePath();c.fill();
  c.shadowBlur=0;
  if(p.twin){c.fillStyle=p.accent||'#8ff';c.fillRect(x+1,y+p.h*0.38,7,p.h*0.32);c.fillRect(x+p.w-8,y+p.h*0.38,7,p.h*0.32);}
  c.fillStyle='rgba(255,255,255,0.25)';c.fillRect(x+p.w*0.41,y+p.h*0.18,p.w*0.18,p.h*0.36);
  c.fillStyle=p.accent||'rgba(255,255,255,0.3)';c.fillRect(x+p.w*0.44,y+p.h*0.82,4,6);c.fillRect(x+p.w*0.56-4,y+p.h*0.82,4,6);
}

// ─── PARTICLES ────────────────────────────────────────────
function spawnExplosion(x,y,col,n){
  n=n||10;
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*0.4;
    const spd=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:30,max:30,col,size:2+Math.random()*3});
  }
}

// ─── SHOOTING ────────────────────────────────────────────
function fireBullet(px,py,owner){
  const a=curAmmo(),plane=curPlane();
  const fr=fireBoost?Math.floor(plane.fireRate/2):plane.fireRate;
  const now=Date.now();
  if(owner===1&&now-lastShot1<fr)return;
  if(owner===2&&now-lastShot2<fr)return;
  if(owner===1)lastShot1=now;else lastShot2=now;
  const offsets=plane.twin?[-20,0,20]:[0];
  offsets.forEach(off=>{
    if(a.spread>0){
      bullets.push({x:px+off-a.spread/2,y:py,s:a.speed,dmg:a.dmg,col:a.color,glow:a.glow,w:a.w,h:a.h,owner});
      bullets.push({x:px+off+a.spread/2,y:py,s:a.speed,dmg:a.dmg,col:a.color,glow:a.glow,w:a.w,h:a.h,owner});
    } else {
      bullets.push({x:px+off,y:py,s:a.speed,dmg:a.dmg,col:a.color,glow:a.glow,w:a.w,h:a.h,owner});
    }
  });
  beep(a.speed>12?1400:a.dmg>2?600:880,0.05,a.dmg>2?'sawtooth':'square',0.07);
}

// ─── UPDATE ──────────────────────────────────────────────
function update(){
  if(!playing)return;
  frame++;
  if(shakeFrames>0)shakeFrames--;
  const plane=curPlane(),pw=plane.w,ph=plane.h,spd=plane.speed;

  // Move stars
  stars.forEach(s=>{s.y+=s.speed;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  function movePlayer(pl,xkeys,ykeys,fireKey,lim){
    if(!pl.alive)return;
    if(pl.flash>0)pl.flash--;
    const xmax=lim!==undefined?lim:W-pw;
    const xmin=lim!==undefined?lim-W/2+pw:0;
    if(keys[xkeys[0]])pl.x=Math.max(xmin>0?W/2:0,pl.x-spd);
    if(keys[xkeys[1]])pl.x=Math.min(xmax,pl.x+spd);
    if(keys[ykeys[0]])pl.y=Math.max(H/2,pl.y-spd);
    if(keys[ykeys[1]])pl.y=Math.min(H-ph-4,pl.y+spd);
    if(keys[fireKey])fireBullet(pl.x+pw/2,pl.y,pl===p1?1:2);
    // trail
    pl.trail.unshift({x:pl.x+pw/2,y:pl.y+ph*0.8});
    if(pl.trail.length>12)pl.trail.pop();
  }

  if(mode===1){
    movePlayer(p1,['a','A','ArrowLeft'],['d','D','ArrowRight'],null,null);
    if(p1.alive){
      if(keys['w']||keys['W']||keys['ArrowUp'])p1.y=Math.max(H/2,p1.y-spd);
      if(keys['s']||keys['S']||keys['ArrowDown'])p1.y=Math.min(H-ph-4,p1.y+spd);
      if(keys[' '])fireBullet(p1.x+pw/2,p1.y,1);
    }
  } else {
    if(p1.alive){
      if(p1.flash>0)p1.flash--;
      if(keys['a']||keys['A'])p1.x=Math.max(0,p1.x-spd);
      if(keys['d']||keys['D'])p1.x=Math.min(W/2-pw,p1.x+spd);
      if(keys['w']||keys['W'])p1.y=Math.max(H/2,p1.y-spd);
      if(keys['s']||keys['S'])p1.y=Math.min(H-ph-4,p1.y+spd);
      if(keys[' '])fireBullet(p1.x+pw/2,p1.y,1);
      p1.trail.unshift({x:p1.x+pw/2,y:p1.y+ph*0.8});if(p1.trail.length>12)p1.trail.pop();
    }
    if(p2.alive){
      if(p2.flash>0)p2.flash--;
      if(keys['ArrowLeft'])p2.x=Math.max(W/2,p2.x-spd);
      if(keys['ArrowRight'])p2.x=Math.min(W-pw,p2.x+spd);
      if(keys['ArrowUp'])p2.y=Math.max(H/2,p2.y-spd);
      if(keys['ArrowDown'])p2.y=Math.min(H-ph-4,p2.y+spd);
      if(keys['Enter'])fireBullet(p2.x+pw/2,p2.y,2);
      p2.trail.unshift({x:p2.x+pw/2,y:p2.y+ph*0.8});if(p2.trail.length>12)p2.trail.pop();
    }
  }

  // Clean bullets
  for(let i=bullets.length-1;i>=0;i--){bullets[i].y-=bullets[i].s;if(bullets[i].y<-30)bullets.splice(i,1);}
  for(let i=eBullets.length-1;i>=0;i--){eBullets[i].y+=eBullets[i].s;if(eBullets[i].y>H+20)eBullets.splice(i,1);}
  for(let i=surprises.length-1;i>=0;i--){surprises[i].y+=surprises[i].s;surprises[i].rot=(surprises[i].rot||0)+0.04;if(surprises[i].y>H+20)surprises.splice(i,1);}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=bonusTexts.length-1;i>=0;i--){bonusTexts[i].y-=0.8;bonusTexts[i].life--;if(bonusTexts[i].life<=0)bonusTexts.splice(i,1);}

  const alive=mice.filter(m=>m.alive);
  if(!alive.length){
    waveInStage++;
    if(waveInStage>=curStage().waves){
      const ns=stage+1;
      if(ns>=STAGES.length){doWin();return;}
      showStageTransition(ns,()=>{
        stage=ns;waveInStage=0;bullets=[];eBullets=[];surprises=[];initWave();updateHUD();
      });
    } else {
      beep(660,0.08);setTimeout(()=>beep(880,0.1),110);
      initWave();updateHUD();
    }
    return;
  }

  // Mouse flash update
  mice.forEach(m=>{if(m.flashTimer>0)m.flashTimer--;});

  // Mouse movement
  const ms=mSpeed*(1+(curStage().rows*curStage().cols-alive.length)/(curStage().rows*curStage().cols)*1.6);
  if(!dropping){
    let mn=9999,mx=-9999;
    for(const m of alive){if(m.x<mn)mn=m.x;if(m.x+36>mx)mx=m.x+36;}
    mice.forEach(m=>{if(m.alive)m.x+=ms*mDir;});
    if((mDir===1&&mx>W-4)||(mDir===-1&&mn<4)){mDir*=-1;dropping=true;dropAmt=0;}
  } else {
    mice.forEach(m=>{if(m.alive)m.y+=2.5;});
    dropAmt+=2.5;if(dropAmt>=22)dropping=false;
  }

  const minPY=mode===1?p1.y:Math.min(p1.alive?p1.y:H,p2.alive?p2.y:H);
  if(alive.some(m=>m.y+24>=minPY)){p1.lives=0;if(mode===2)p2.lives=0;doGameOver();return;}

  // Enemy shoot
  if(Math.random()<0.005+stage*0.0015){
    const cols=[...new Set(alive.map(m=>m.c))];
    const col=cols[Math.floor(Math.random()*cols.length)];
    const cm=alive.filter(m=>m.c===col);
    const sh=cm.reduce((a,b)=>a.r>b.r?a:b);
    eBullets.push({x:sh.x+18,y:sh.y+24,s:2.5+stage*0.38,zig:Math.random()<0.3?1:0,zigPhase:Math.random()*10});
  }

  // Surprise drops
  if(Math.random()<0.003){
    const maxR=Math.max(...alive.map(m=>m.r));
    const bot=alive.filter(m=>m.r===maxR);
    const d=bot[Math.floor(Math.random()*bot.length)];
    surprises.push({x:d.x+8,y:d.y+24,s:1.6,val:[100,200,300,500][Math.floor(Math.random()*4)],rot:0});
  }

  // Bullet-mouse collision
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];if(!b)continue;
    let hit=false;
    for(let j=mice.length-1;j>=0;j--){
      const m=mice[j];if(!m.alive)continue;
      if(b.x>m.x-2&&b.x<m.x+38&&b.y<m.y+24&&b.y+(b.h||14)>m.y){
        m.hp-=(b.dmg||1);m.flashTimer=8;
        spawnExplosion(m.x+18,m.y+12,m.hp<=0?'#ff8':'#f88',m.hp<=0?10:4);
        if(m.hp<=0){
          m.alive=false;
          const pts=([10,20,30,40,50][m.r]||10)*(stage+1);
          coins+=Math.floor(pts/5);
          if(b.owner===1)p1.score+=pts;else if(mode===2)p2.score+=pts;else p1.score+=pts;
          beep(220,0.12,'sawtooth',0.12);
          shakeFrames=4;
        } else {beep(440,0.04,'square',0.06);}
        bullets.splice(i,1);hit=true;updateHUD();break;
      }
    }
    if(hit||!bullets[i])continue;
    for(let k=surprises.length-1;k>=0;k--){
      const s=surprises[k];
      if(b.x>s.x&&b.x<s.x+22&&b.y<s.y+22&&b.y+14>s.y){
        coins+=Math.floor(s.val/10);
        if(b.owner===1)p1.score+=s.val;else if(mode===2)p2.score+=s.val;else p1.score+=s.val;
        spawnExplosion(s.x+11,s.y+11,'#f8f',12);
        bonusTexts.push({x:s.x+11,y:s.y-4,text:'+'+s.val,life:60,col:'#f8f'});
        surprises.splice(k,1);bullets.splice(i,1);
        beep(660,0.07);setTimeout(()=>beep(880,0.07),80);setTimeout(()=>beep(1100,0.1),160);
        updateHUD();break;
      }
    }
  }

  // Enemy bullets hit player
  eBullets.forEach(b=>{if(b.zig)b.x+=Math.sin(frame*0.15+b.zigPhase)*1.5;});
  function chkHit(pl){return pl.alive&&pl.flash===0;}
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    if(chkHit(p1)&&b.x>p1.x&&b.x<p1.x+pw&&b.y+10>p1.y&&b.y<p1.y+ph){
      p1.lives--;p1.flash=65;eBullets.splice(i,1);shakeFrames=8;
      spawnExplosion(p1.x+pw/2,p1.y+ph/2,'#f44',8);
      beep(100,0.4,'sawtooth',0.2);updateHUD();
      if(p1.lives<=0){p1.alive=false;if(mode===1||!p2.alive)doGameOver();}continue;
    }
    if(mode===2&&chkHit(p2)&&b.x>p2.x&&b.x<p2.x+pw&&b.y+10>p2.y&&b.y<p2.y+ph){
      p2.lives--;p2.flash=65;eBullets.splice(i,1);shakeFrames=8;
      spawnExplosion(p2.x+pw/2,p2.y+ph/2,'#f84',8);
      beep(100,0.4,'sawtooth',0.2);updateHUD();
      if(p2.lives<=0){p2.alive=false;if(!p1.alive)doGameOver();}
    }
  }
  for(let i=surprises.length-1;i>=0;i--){
    const s=surprises[i];
    if(chkHit(p1)&&s.x+22>p1.x&&s.x<p1.x+pw&&s.y+22>p1.y&&s.y<p1.y+ph){
      p1.lives--;p1.flash=65;surprises.splice(i,1);shakeFrames=8;
      beep(100,0.4,'sawtooth',0.2);updateHUD();
      if(p1.lives<=0){p1.alive=false;if(mode===1||!p2.alive)doGameOver();}continue;
    }
    if(mode===2&&chkHit(p2)&&s.x+22>p2.x&&s.x<p2.x+pw&&s.y+22>p2.y&&s.y<p2.y+ph){
      p2.lives--;p2.flash=65;surprises.splice(i,1);shakeFrames=8;
      beep(100,0.4,'sawtooth',0.2);updateHUD();
      if(p2.lives<=0){p2.alive=false;if(!p1.alive)doGameOver();}
    }
  }
}

// ─── DRAW HELPERS ────────────────────────────────────────
function drawRoundRect(x,y,w,h,r,fill,stroke,lineW){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lineW||1;ctx.stroke();}
}

function drawMouse(m){
  const x=m.x,y=m.y;
  const stageColors=[['#e88bb8','#c04080'],['#c8a878','#8a6030'],['#a888e8','#6030b0'],['#88e8a8','#30a060'],['#e8e888','#a0a020']];
  const [bodyCol,darkCol]=stageColors[Math.min(stage,stageColors.length-1)];
  const col=m.hp>1?'#e84040':bodyCol;
  const dark=m.hp>1?'#a01010':darkCol;
  const flash=m.flashTimer>0;

  ctx.save();
  if(flash){ctx.globalAlpha=0.5+0.5*Math.sin(frame*1.5);}

  // Body glow
  ctx.shadowColor=col;ctx.shadowBlur=8;
  // Ears
  ctx.fillStyle=flash?'#fff':dark;
  ctx.beginPath();ctx.ellipse(x+6,y+4,7,5,-0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+30,y+4,7,5,0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=flash?'#faa':'#f88';
  ctx.beginPath();ctx.ellipse(x+6,y+4,4,3,-0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+30,y+4,4,3,0.4,0,Math.PI*2);ctx.fill();

  // Head
  ctx.fillStyle=flash?'#fff':col;
  ctx.shadowColor=col;ctx.shadowBlur=10;
  ctx.beginPath();ctx.ellipse(x+18,y+13,12,10,0,0,Math.PI*2);ctx.fill();
  // Body
  ctx.beginPath();ctx.ellipse(x+18,y+22,9,7,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(x+13,y+11,3.5,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+23,y+11,3.5,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(x+13,y+11,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+23,y+11,1.8,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.arc(x+13.8,y+10.2,0.7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+23.8,y+10.2,0.7,0,Math.PI*2);ctx.fill();

  // Nose
  ctx.fillStyle='#f88';
  ctx.beginPath();ctx.ellipse(x+18,y+15,2.5,2,0,0,Math.PI*2);ctx.fill();

  // Whiskers
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=0.8;
  const ww=Math.sin(frame*0.12+m.c)*1.5;
  [[x+15,y+15,x+2,y+14+ww],[x+21,y+15,x+34,y+14+ww],[x+15,y+16,x+2,y+18+ww],[x+21,y+16,x+34,y+18+ww]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });

  // HP bar
  if(m.maxHp>1){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(x,y-7,36,4);
    const hpColor=m.hp===m.maxHp?'#4e4':m.hp===1?'#f44':'#fa4';
    ctx.fillStyle=hpColor;ctx.fillRect(x,y-7,36*(m.hp/m.maxHp),4);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.5;ctx.strokeRect(x,y-7,36,4);
  }
  ctx.restore();
}

function drawPlayer(pl,color,isP2){
  if(!pl.alive)return;
  const plane=curPlane();
  // Draw engine trail
  pl.trail.forEach((t,i)=>{
    const alpha=(1-i/pl.trail.length)*0.35;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=color;
    ctx.beginPath();ctx.ellipse(t.x,t.y,3*(1-i/pl.trail.length),5*(1-i/pl.trail.length),0,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  if(pl.flash>0&&Math.floor(pl.flash/4)%2===0)return;
  const x=pl.x,y=pl.y,pw=plane.w,ph=plane.h;

  ctx.save();
  ctx.shadowColor=color;ctx.shadowBlur=16;

  // Wings
  ctx.fillStyle=color+'99';
  ctx.beginPath();ctx.moveTo(x+pw*0.2,y+ph*0.5);ctx.lineTo(x-pw*0.08,y+ph);ctx.lineTo(x+pw*0.42,y+ph*0.65);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+pw*0.8,y+ph*0.5);ctx.lineTo(x+pw*1.08,y+ph);ctx.lineTo(x+pw*0.58,y+ph*0.65);ctx.closePath();ctx.fill();

  // Body
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x+pw/2,y);
  ctx.quadraticCurveTo(x+pw*0.75,y+ph*0.3,x+pw,y+ph);
  ctx.lineTo(x+pw*0.65,y+ph*0.72);
  ctx.lineTo(x+pw/2,y+ph*0.88);
  ctx.lineTo(x+pw*0.35,y+ph*0.72);
  ctx.lineTo(x,y+ph);
  ctx.quadraticCurveTo(x+pw*0.25,y+ph*0.3,x+pw/2,y);
  ctx.closePath();ctx.fill();

  // Twin wings for X-Wing
  if(plane.twin){
    ctx.fillStyle=color+'bb';
    ctx.fillRect(x,y+ph*0.35,8,ph*0.32);
    ctx.fillRect(x+pw-8,y+ph*0.35,8,ph*0.32);
    ctx.shadowBlur=0;
    ctx.strokeStyle=color;ctx.lineWidth=1;
    ctx.strokeRect(x,y+ph*0.35,8,ph*0.32);
    ctx.strokeRect(x+pw-8,y+ph*0.35,8,ph*0.32);
  }

  // Cockpit
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(180,240,255,0.5)';
  ctx.beginPath();ctx.ellipse(x+pw/2,y+ph*0.3,pw*0.1,ph*0.2,0,0,Math.PI*2);ctx.fill();

  // Engines
  ctx.fillStyle='#f84';ctx.shadowColor='#f84';ctx.shadowBlur=8;
  ctx.fillRect(x+pw*0.38,y+ph*0.85,5,7);
  ctx.fillRect(x+pw*0.62-5,y+ph*0.85,5,7);

  // Engine glow flame
  ctx.globalAlpha=0.4+0.4*Math.sin(frame*0.3);
  ctx.fillStyle='#ff6600';
  ctx.beginPath();ctx.ellipse(x+pw*0.405,y+ph+4,3,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+pw*0.6-1,y+ph+4,3,6,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // NADAV glow ring
  if(selectedPlane===7){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(x+pw/2,y+ph/2,pw*0.7,ph*0.7,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  ctx.shadowColor=b.glow||b.col;ctx.shadowBlur=10;
  // Glow core
  const grad=ctx.createLinearGradient(b.x,b.y,b.x,b.y+(b.h||14));
  grad.addColorStop(0,'#fff');grad.addColorStop(0.3,b.col);grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.roundRect(b.x-(b.w||4)/2,b.y,b.w||4,b.h||14,2);ctx.fill();
  ctx.restore();
}

function drawEnemyBullet(b){
  ctx.save();
  ctx.shadowColor='#f44';ctx.shadowBlur=8;
  const grad=ctx.createLinearGradient(b.x,b.y,b.x,b.y+10);
  grad.addColorStop(0,'#faa');grad.addColorStop(0.5,'#f44');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.roundRect(b.x-2.5,b.y,5,10,2);ctx.fill();
  ctx.restore();
}

function drawSurprise(s){
  ctx.save();
  ctx.translate(s.x+12,s.y+12);ctx.rotate(s.rot||0);
  const hue=(frame*4)%360;
  ctx.shadowColor=`hsl(${hue},100%,65%)`;ctx.shadowBlur=14;
  ctx.fillStyle=`hsl(${hue},100%,60%)`;
  ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('?',0,0);
  ctx.restore();
}

// ─── DRAW MAIN ───────────────────────────────────────────
function draw(){
  ctx.save();
  if(shakeFrames>0){ctx.translate((Math.random()-0.5)*6,(Math.random()-0.5)*6);}

  // Background gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  const bgColors=[['#000010','#000820'],['#100800','#080400'],['#08001a','#04000e'],['#001008','#000804'],['#0a0a00','#050500']];
  const [c1,c2]=bgColors[Math.min(stage,bgColors.length-1)];
  bg.addColorStop(0,c1);bg.addColorStop(1,c2);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Stars (parallax)
  stars.forEach(s=>{
    const twinkle=0.3+0.7*Math.abs(Math.sin(frame*0.02+s.bright*10));
    ctx.fillStyle=`rgba(255,255,255,${s.bright*twinkle*0.8})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();
  });

  // Nebula effect
  ctx.save();
  const nb=ctx.createRadialGradient(W*0.3,H*0.2,0,W*0.3,H*0.2,200);
  const nbColors=[['rgba(20,40,120,0.06)'],['rgba(80,40,0,0.06)'],['rgba(60,0,100,0.08)'],['rgba(0,80,40,0.08)'],['rgba(80,60,0,0.1)']];
  nb.addColorStop(0,nbColors[Math.min(stage,nbColors.length-1)][0]);
  nb.addColorStop(1,'transparent');
  ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Movement boundary line
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.setLineDash([5,10]);
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);

  // 2P divider
  if(mode===2){
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([6,8]);
    ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  }

  // Mice
  for(const m of mice){if(m.alive)drawMouse(m);}

  // Bullets
  for(const b of bullets)drawBullet(b);
  for(const b of eBullets)drawEnemyBullet(b);

  // Surprises
  for(const s of surprises)drawSurprise(s);

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life/p.max;
    ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.max),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Bonus texts
  for(const bt of bonusTexts){
    ctx.globalAlpha=bt.life/60;
    ctx.save();ctx.shadowColor=bt.col||'#f8f';ctx.shadowBlur=8;
    ctx.fillStyle=bt.col||'#f8f';ctx.font='bold 18px Arial';ctx.textAlign='center';
    ctx.fillText(bt.text,bt.x,bt.y);ctx.restore();
  }
  ctx.globalAlpha=1;

  // Players
  drawPlayer(p1,curPlane().color);
  if(mode===2)drawPlayer(p2,'#fa7',true);

  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
showMainMenu();
loop();
})();
</script>
